services:
  - type: web
    name: trailquest-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: CORS_ORIGIN
        value: "*"
    healthCheckPath: /api/health

  # Admin panel — static Vite build served from Render's CDN (free).
  - type: web
    name: trailquest-admin
    runtime: static
    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    # SPA: every path falls back to index.html for react-router.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://trailquest-backend-uze0.onrender.com/api
      - key: VITE_MAPBOX_TOKEN
        sync: false
